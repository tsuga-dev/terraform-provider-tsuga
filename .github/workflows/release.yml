# Terraform Provider release workflow.
name: Release

# This GitHub action creates a release when a tag that matches the pattern
# "v*" (e.g. v0.1.0) is created.
on:
    push:
        tags:
            - v*

permissions:
    contents: write

jobs:
    goreleaser:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0
              with:
                  # Allow goreleaser to access older tag information.
                  fetch-depth: 0
            - uses: actions/setup-go@4dc6199c7b1a012772edbd06daecab0f50c9053c # v6.1.0
              with:
                  go-version-file: go.mod
                  cache: true
            - name: Import GPG key
              uses: crazy-max/ghaction-import-gpg@e89d40939c28e39f97cf32126055eeae86ba74ec # v6.3.0
              id: import_gpg
              with:
                  gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
                  passphrase: ${{ secrets.PASSPHRASE }}
            - name: Extract release notes from CHANGELOG
              id: notes
              run: |
                  VERSION="${GITHUB_REF_NAME#v}"
                  NOTES_FILE="$(mktemp)"
                  # Print the body of the "## [<version>]" section, stopping at the next "## [" heading.
                  awk -v ver="$VERSION" '
                      /^## \[/ {
                          if (found) exit
                          if (index($0, "[" ver "]")) { found = 1; next }
                      }
                      found { print }
                  ' CHANGELOG.md > "$NOTES_FILE"
                  # Trim leading blank lines.
                  sed -i -e '/./,$!d' "$NOTES_FILE"
                  if [ ! -s "$NOTES_FILE" ]; then
                      echo "::error::No CHANGELOG section found for ${VERSION}. Add a '## [${VERSION}]' section to CHANGELOG.md and re-tag."
                      exit 1
                  fi
                  echo "file=$NOTES_FILE" >> "$GITHUB_OUTPUT"
                  echo "----- release notes for ${GITHUB_REF_NAME} -----"
                  cat "$NOTES_FILE"
            - name: Run GoReleaser
              uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a # v6.4.0
              with:
                  args: release --clean --release-notes=${{ steps.notes.outputs.file }}
              env:
                  # GitHub sets the GITHUB_TOKEN secret automatically.
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  GPG_FINGERPRINT: ${{ steps.import_gpg.outputs.fingerprint }}
            # GoReleaser's --release-notes body does not persist on this repo's
            # immutable releases, so set it explicitly after publish.
            - name: Set release notes on the published release
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: gh release edit "${GITHUB_REF_NAME}" --notes-file "${{ steps.notes.outputs.file }}"
            - name: Send Slack notification
              uses: rtCamp/action-slack-notify@c33737706dea87cd7784c687dadc9adf1be59990 # pin@v2
              env:
                  SLACK_USERNAME: GitHub CI Bot
                  SLACK_COLOR: good
                  MSG_MINIMAL: actions url
                  SLACK_TITLE: "🚀 Terraform Provider Released"
                  SLACK_MESSAGE: "A new release has been published: ${{ github.ref_name }}"
                  SLACK_FOOTER: "https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}"
                  SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
